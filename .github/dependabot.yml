version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: sunday
    groups:
      patch-and-minor:
        update-types: [patch, minor]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      ci:
        update-types: [patch, minor]
