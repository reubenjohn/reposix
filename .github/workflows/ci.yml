name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - run: cargo test --workspace --locked

  integration:
    name: integration (mounted FS)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Verify FUSE available
        run: |
          ls -l /dev/fuse
          which fusermount3
      - name: Build release binaries
        run: cargo build --release --workspace --bins
      - name: Run integration tests (requires FUSE)
        run: cargo test --workspace --release -- --ignored --test-threads=1
        continue-on-error: true  # phase 3 will flip this off

  demos-smoke:
    name: demos smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y fuse3 jq sqlite3
      - name: Build release binaries
        run: cargo build --release --workspace --bins
      - name: Run Tier 1 demo smoke suite
        run: PATH="$PWD/target/release:$PATH" bash scripts/demos/smoke.sh
        # Load-bearing: drift in any Tier 1 demo should break CI, not be
        # silently tolerated. No continue-on-error.

  integration-contract:
    # Hits real GitHub (octocat/Hello-World) with the contract test helper.
    # Flaky by design: unauthenticated GITHUB_TOKEN-less CI hits the 60
    # req/hr ceiling. We accept the flake (continue-on-error) for the first
    # commit and will flip continue-on-error off once a bot token is set as
    # a repo secret.
    name: integration (contract, real github — may flake 60/hr rate limit)
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-github contract test against real GitHub
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          # GITHUB_TOKEN is auto-injected by Actions and lifts the 60/hr
          # anonymous cap to 1000/hr for the repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p reposix-github -- --ignored

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
