name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - run: cargo test --workspace --locked
      - name: Test pre-push credential hook
        run: bash scripts/hooks/test-pre-push.sh

  integration:
    name: integration (mounted FS)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Install macFUSE (macOS)
        # NOTE(E3): gythialy/macfuse action was not found on GitHub as of
        # 2026-04-15. This step will fail on macos-14 runners until the
        # correct action reference is confirmed at the E3 checkpoint.
        # See .planning/phases/21-.../21-E-macos-PLAN.md Task E3.
        if: runner.os == 'macOS'
        uses: gythialy/macfuse@v1
      - name: Verify FUSE available (Linux)
        if: runner.os == 'Linux'
        run: ls -l /dev/fuse && which fusermount3
      - name: Verify FUSE available (macOS)
        if: runner.os == 'macOS'
        run: which mount_macfuse || which mount_osxfuse || true
      - name: Build release binaries
        run: cargo build --release --workspace --bins
      - name: Run integration tests (requires FUSE)
        # Scoped to `-p reposix-fuse` so this job doesn't pick up
        # `#[ignore]`-gated live-backend contract tests (reposix-github
        # contract_github, reposix-confluence contract_confluence_live*)
        # — those need real credentials and have their own dedicated
        # jobs (`integration (contract, real github)`,
        # `integration (contract, real confluence)`).
        env:
          REPOSIX_UNMOUNT_CMD: ${{ runner.os == 'macOS' && 'umount -f' || 'fusermount3 -u' }}
        run: cargo test -p reposix-fuse --release --locked -- --ignored --test-threads=1

  demos-smoke:
    name: demos smoke
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y fuse3 jq sqlite3
      - name: Build release binaries
        run: cargo build --release --workspace --bins
      - name: Run Tier 1 demo smoke suite
        run: PATH="$PWD/target/release:$PATH" bash scripts/demos/smoke.sh
        # Load-bearing: drift in any Tier 1 demo should break CI, not be
        # silently tolerated. No continue-on-error.

  integration-contract:
    # Hits real GitHub (octocat/Hello-World) with the contract test helper.
    # GITHUB_TOKEN is auto-injected by Actions and lifts the 60/hr anonymous
    # cap to 1000/hr for the repo. That's plenty for per-push contract
    # testing, so this job is load-bearing (no continue-on-error).
    name: integration (contract, real github)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-github contract test against real GitHub
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p reposix-github -- --ignored

  integration-contract-confluence:
    # Hits real Atlassian Confluence via reposix-confluence's contract test.
    # Skips cleanly (exit 0) when any of the four secrets is missing so fork
    # PRs don't fail and incomplete configs surface a SKIP rather than a
    # false failure. We deliberately do NOT use a job-level `if:` on
    # `secrets.*`: GitHub Actions rejects that with "workflow file issue"
    # because the `secrets` context is not available at job-definition time.
    # Instead, the single step below materialises the secret into a local
    # shell var and exits 0 early if absent.
    # The secrets MUST be set by the repo owner via:
    #   gh secret set ATLASSIAN_API_KEY
    #   gh secret set ATLASSIAN_EMAIL
    #   gh secret set REPOSIX_CONFLUENCE_TENANT
    #   gh secret set REPOSIX_CONFLUENCE_SPACE      # space key for the contract test
    # (see HANDOFF.md for the one-shot command).
    name: integration (contract, real confluence)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-confluence contract test against real Atlassian
        env:
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
          REPOSIX_CONFLUENCE_SPACE: ${{ secrets.REPOSIX_CONFLUENCE_SPACE }}
        run: |
          if [ -z "$ATLASSIAN_API_KEY" ] || [ -z "$ATLASSIAN_EMAIL" ] \
             || [ -z "$REPOSIX_CONFLUENCE_TENANT" ] || [ -z "$REPOSIX_CONFLUENCE_SPACE" ]; then
            echo "SKIP: one or more Atlassian secrets unset on this repo (fork or bootstrap)."
            echo "Set them via: gh secret set ATLASSIAN_API_KEY (and the other 3)"
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          cargo test -p reposix-confluence -- --ignored

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install runtime FUSE binaries
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
