name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
      - name: Test pre-push credential hook
        run: bash scripts/hooks/test-pre-push.sh

  dark-factory:
    name: dark-factory regression (sim)
    # v0.9.0 architecture pivot: the FUSE-backed `integration (mounted FS)`
    # job is replaced by the dark-factory regression — proves the agent UX
    # is "pure git, zero in-context learning" (architecture-pivot-summary §4).
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3
      - name: Run dark-factory test (sim backend)
        run: bash scripts/dark-factory-test.sh sim

  integration-contract:
    # Hits real GitHub (octocat/Hello-World) with the contract test helper.
    # GITHUB_TOKEN is auto-injected by Actions and lifts the 60/hr anonymous
    # cap to 1000/hr for the repo. That's plenty for per-push contract
    # testing, so this job is load-bearing (no continue-on-error).
    name: integration (contract, real github)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-github contract test against real GitHub
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p reposix-github -- --ignored

  integration-contract-confluence:
    # Hits real Atlassian Confluence via reposix-confluence's contract test.
    # Skips cleanly (exit 0) when any of the four secrets is missing so fork
    # PRs don't fail and incomplete configs surface a SKIP rather than a
    # false failure. We deliberately do NOT use a job-level `if:` on
    # `secrets.*`: GitHub Actions rejects that with "workflow file issue"
    # because the `secrets` context is not available at job-definition time.
    # Instead, the single step below materialises the secret into a local
    # shell var and exits 0 early if absent.
    # The secrets MUST be set by the repo owner via:
    #   gh secret set ATLASSIAN_API_KEY
    #   gh secret set ATLASSIAN_EMAIL
    #   gh secret set REPOSIX_CONFLUENCE_TENANT
    #   gh secret set REPOSIX_CONFLUENCE_SPACE      # space key for the contract test
    # (see HANDOFF.md for the one-shot command).
    name: integration (contract, real confluence)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-confluence contract test against real Atlassian
        env:
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
          REPOSIX_CONFLUENCE_SPACE: ${{ secrets.REPOSIX_CONFLUENCE_SPACE }}
        run: |
          if [ -z "$ATLASSIAN_API_KEY" ] || [ -z "$ATLASSIAN_EMAIL" ] \
             || [ -z "$REPOSIX_CONFLUENCE_TENANT" ] || [ -z "$REPOSIX_CONFLUENCE_SPACE" ]; then
            echo "SKIP: one or more Atlassian secrets unset on this repo (fork or bootstrap)."
            echo "Set them via: gh secret set ATLASSIAN_API_KEY (and the other 3)"
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          cargo test -p reposix-confluence -- --ignored

  integration-contract-confluence-v09:
    # ARCH-19 v0.9.0 real-backend gate: Confluence TokenWorld via the
    # gated agent_flow_real test. Skips cleanly when secrets are absent.
    name: integration (contract, real confluence v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against TokenWorld
        env:
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
        run: |
          if [ -z "$ATLASSIAN_API_KEY" ] || [ -z "$ATLASSIAN_EMAIL" ] \
             || [ -z "$REPOSIX_CONFLUENCE_TENANT" ]; then
            echo "SKIP: pending-secrets — one or more Atlassian secrets unset."
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_confluence

  integration-contract-github-v09:
    # ARCH-19 v0.9.0 real-backend gate: reubenjohn/reposix issues.
    name: integration (contract, real github v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against reubenjohn/reposix
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_github

  integration-contract-jira-v09:
    # ARCH-19 v0.9.0 real-backend gate: JIRA project TEST. Skips cleanly
    # when secrets are absent (pending-secrets).
    name: integration (contract, real jira v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against JIRA TEST
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REPOSIX_JIRA_INSTANCE: ${{ secrets.REPOSIX_JIRA_INSTANCE }}
        run: |
          if [ -z "$JIRA_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ] \
             || [ -z "$REPOSIX_JIRA_INSTANCE" ]; then
            echo "SKIP: pending-secrets — one or more JIRA secrets unset."
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_JIRA_INSTANCE}.atlassian.net"
          cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_jira

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
