name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  gitleaks:
    # D-CONV-4 (2026-07-04, quality/SURPRISES.md "Quality Convergence"):
    # full-ruleset secret-scanning backstop -- Layer 2 of the two-layer
    # design. Layer 1 is the zero-dep grep gate
    # (quality/gates/structure/cred-hygiene.sh) run in the pre-push hook;
    # this job is the broad CI layer using gitleaks' full detector set.
    #
    # We pin the release BINARY by version + sha256 rather than using the
    # gitleaks-action marketplace action: that action requires a license key
    # for organizations and adds a supply-chain hop; a checksum-verified
    # binary download is simpler and self-documenting. To bump: change
    # GITLEAKS_VERSION, fetch gitleaks_<ver>_checksums.txt from the release,
    # and update GITLEAKS_SHA256 to the linux_x64 line.
    #
    # Scope: FULL history (fetch-depth: 0) so a secret introduced in ANY
    # commit is caught, not just the tip. The .gitleaks.toml allowlist covers
    # the one known false positive (.playwright-mcp/ browser console logs --
    # see that file's comments). Full-history scan of this repo runs in <3s,
    # comfortably inside the 2-minute budget.
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download pinned gitleaks + verify checksum
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Scan full git history for secrets
        # --redact so a real hit never prints the secret into public CI logs.
        run: ./gitleaks git . -c .gitleaks.toml --redact --no-banner

  quality-pre-pr:
    # D-CONV-1 (2026-07-04, quality/SURPRISES.md "Quality Convergence"):
    # wires the pre-pr cadence for real. Before this job, 61 rows across 7
    # catalogs carried the pre-pr tag with ZERO CI executions -- a tag that
    # never fires teaches agents the catalog lies. Rows whose substance
    # this workflow already hand-wires as a dedicated job (fmt, clippy,
    # cargo test --workspace, dark-factory sim arm) were stripped from
    # pre-pr to avoid duplicate compute -- those jobs stay for per-check
    # UI granularity + rust-cache reuse. This job covers everything else:
    # docs-build, freshness invariants, docs-alignment/walk, and ~20
    # DVCS/agent-ux integration rows (bus writes, mirror refs, webhooks,
    # attach) that had never run in CI before today.
    name: quality gates (pre-pr)
    runs-on: ubuntu-latest
    # 28 (not the 10-min PROTOCOL budget). REAL driver, confirmed by forensic
    # trace (2026-07-18/19, #65->#66 relief + GTH filed below): the "Warm
    # cargo build" step's `cargo build --workspace --bins` is what hits the
    # wall on a rust-cache MISS -- observed cold 15m51s-20m00s (job killed at
    # the old 15-min cap, twice). WARM runs (cache hit) finish in ~3-4m
    # (observed 3m39s on 394ebc3a's 3rd attempt, 4m06s on 592ae4c0). This was
    # previously misdiagnosed as queue contention; it is a cold-cache timeout
    # wall. 28 covers a cold miss with headroom -- it is a band-aid, NOT the
    # fix. The real fix is a better rust-cache hit rate; see the GTH filed in
    # .planning/milestones/v0.15.0-phases/good-to-haves/ ("Improve CI
    # rust-cache hit rate...").
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install MkDocs + Material (for docs-build/* rows)
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material mkdocs-minify-plugin mkdocs-redirects
      - name: Install runtime tooling (jq, sqlite3)
        # jq + sqlite3: agent-ux/dvcs-third-arm. code/shell-coverage is pre-push
        # only (D-CONV-1: dedicated-CI-job rows are stripped from pre-pr), so it
        # is NOT composed here — its own `shell-coverage` job below enforces it.
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3
      - name: Warm cargo build
        # Several pre-pr rows (bus-write-*, mirror-refs-*, dvcs-third-arm,
        # capabilities-match-impl, docs-alignment/walk, ...) shell out to
        # `cargo build`/`cargo test -p <crate>` individually. Building the
        # workspace once up front means those per-row invocations hit warm
        # incremental compilation instead of each paying a cold-compile
        # cost -- keeps the whole job inside the <10min pre-pr budget
        # (quality/PROTOCOL.md "Latency budgets").
        run: cargo build --workspace --bins --quiet
      - name: Run quality gates (pre-pr cadence)
        # `timeout -k 30 1200`: HARD 20-min cap (< the 28-min job budget) so a
        # WEDGED gate FAILS (exit 124, logs KEPT) instead of the job being
        # CANCELLED at its `timeout-minutes` cap — cancelled-job logs are
        # PURGED, which is exactly why the 2026-07-18/19 pre-pr hang was
        # undiagnosable. `-k 30` sends SIGKILL 30s after the initial SIGTERM to
        # reap orphaned grandchildren (a backgrounded sim surviving SIGTERM
        # caused the 33-vs-28-min overshoot). Pairs with the fd-redirect
        # hardening in quality/gates/agent-ux/* (a backgrounded process that
        # inherits run.py's capture_output pipe deadlocks communicate() until
        # the gate timeout). The per-gate START line run.py now flushes names
        # whichever gate the timeout kills.
        run: timeout -k 30 1200 python3 quality/runners/run.py --cadence pre-pr
      - name: Dump survivor process tree on failure (hang forensics)
        # Pairs with the `timeout` wrapper above: when a pre-pr gate wedges and
        # the timeout FAILS this step, dump the surviving process state so the
        # next hang is fully forensic — a backgrounded sim / orphaned grandchild
        # still holding run.py's pipe shows up here BY NAME. `pstree` may be
        # absent on the runner image, so fall back to `ps -ef --forest`.
        # Non-fatal (`|| true`) so diagnostics never mask the real failure exit.
        if: failure()
        run: |
          echo "=== ps auxf (survivor processes) ==="
          ps auxf || true
          echo "=== process tree ==="
          pstree -p 2>/dev/null || ps -ef --forest || true
      - name: Dump verification artifacts on failure
        # run.py captures each verifier's stdout/stderr into the per-row JSON
        # artifact, NOT the job log -- so a FAIL row (e.g. agent-ux/*) leaves
        # its diagnosis in an ephemeral file the runner never prints. On
        # failure, dump every verification artifact + any transcript so the
        # root cause is visible in the CI log without a local reproduction
        # (v0.13.0 GOOD-TO-HAVES: pre-pr artifact diagnosability).
        if: failure()
        run: python3 quality/runners/dump_verifications.py

  test:
    name: test
    runs-on: ubuntu-latest
    # Explicit cap (else GitHub's 360-min default silently applies -- 2026-07-19
    # pre-pr timeout forensic audit). Observed 2m28s-2m45s across 3 recent green
    # runs (29677846998/29676798318/29674505740); 6 is ~2x the high end,
    # bounded fast-fail on a genuine hang without chasing rust-cache-miss
    # variance (that's the pre-pr job's problem, tracked via the GTH below).
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: cargo test --workspace --locked
      - name: Test pre-push credential hook
        # Unit test for the credential-hygiene gate + the hook's exit
        # plumbing. It PATH-stubs the hook's step-2 quality runner
        # (clippy/mkdocs/shell-coverage), which owns its own CI jobs
        # (`quality gates`, `shell-coverage`) -- so this security test no
        # longer needs MkDocs installed or reposix-quality prebuilt, and no
        # longer goes RED when an unrelated lane's clippy warns or kcov is
        # absent. See the scope note atop .githooks/test-pre-push.sh.
        run: bash .githooks/test-pre-push.sh

  dark-factory:
    name: dark-factory regression (sim)
    # v0.9.0 architecture pivot: the FUSE-backed `integration (mounted FS)`
    # job is replaced by the dark-factory regression — proves the agent UX
    # is "pure git, zero in-context learning" (architecture-pivot-summary §4).
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3
      - name: Run dark-factory test (sim backend)
        run: bash quality/gates/agent-ux/dark-factory.sh sim

  integration-contract:
    # Hits real GitHub (octocat/Hello-World) with the contract test helper.
    # GITHUB_TOKEN is auto-injected by Actions and lifts the 60/hr anonymous
    # cap to 1000/hr for the repo. That's plenty for per-push contract
    # testing, so this job is load-bearing (no continue-on-error).
    name: integration (contract, real github)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-github contract test against real GitHub
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p reposix-github -- --ignored

  integration-contract-confluence:
    # Hits real Atlassian Confluence via reposix-confluence's contract test.
    # Skips cleanly (exit 0) when any of the four secrets is missing so fork
    # PRs don't fail and incomplete configs surface a SKIP rather than a
    # false failure. We deliberately do NOT use a job-level `if:` on
    # `secrets.*`: GitHub Actions rejects that with "workflow file issue"
    # because the `secrets` context is not available at job-definition time.
    # Instead, the single step below materialises the secret into a local
    # shell var and exits 0 early if absent.
    # The secrets MUST be set by the repo owner via:
    #   gh secret set ATLASSIAN_API_KEY
    #   gh secret set ATLASSIAN_EMAIL
    #   gh secret set REPOSIX_CONFLUENCE_TENANT
    #   gh secret set REPOSIX_CONFLUENCE_SPACE      # space key for the contract test
    # (see HANDOFF.md for the one-shot command).
    name: integration (contract, real confluence)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-confluence contract test against real Atlassian
        env:
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
          REPOSIX_CONFLUENCE_SPACE: ${{ secrets.REPOSIX_CONFLUENCE_SPACE }}
        run: |
          if [ -z "$ATLASSIAN_API_KEY" ] || [ -z "$ATLASSIAN_EMAIL" ] \
             || [ -z "$REPOSIX_CONFLUENCE_TENANT" ] || [ -z "$REPOSIX_CONFLUENCE_SPACE" ]; then
            echo "SKIP: one or more Atlassian secrets unset on this repo (fork or bootstrap)."
            echo "Set them via: gh secret set ATLASSIAN_API_KEY (and the other 3)"
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          cargo test -p reposix-confluence -- --ignored

  integration-contract-confluence-v09:
    # ARCH-19 v0.9.0 real-backend gate: Confluence TokenWorld via the
    # gated agent_flow_real test. Skips cleanly when secrets are absent.
    name: integration (contract, real confluence v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against TokenWorld
        env:
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
        run: |
          if [ -z "$ATLASSIAN_API_KEY" ] || [ -z "$ATLASSIAN_EMAIL" ] \
             || [ -z "$REPOSIX_CONFLUENCE_TENANT" ]; then
            echo "SKIP: pending-secrets — one or more Atlassian secrets unset."
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          # Build + PATH the git-remote-reposix helper: agent_flow_real shells out to git,
          # which resolves the remote-reposix transport from PATH (else 'not a git command').
          cargo build --workspace --bins
          export PATH="$PWD/target/debug:$PATH"
          cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_confluence

  integration-contract-github-v09:
    # ARCH-19 v0.9.0 real-backend gate: reubenjohn/reposix issues.
    # KNOWN LIMITATION: pre-existing GitHub-v09 helper-path 404, filed S-260707-gh404 — tracked for v0.14.0; JIRA+Confluence v09 real-backend pass.
    continue-on-error: true
    name: integration (contract, real github v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against reubenjohn/reposix
        env:
          REPOSIX_ALLOWED_ORIGINS: http://127.0.0.1:*,https://api.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build + PATH the git-remote-reposix helper: agent_flow_real shells out to git,
          # which resolves the remote-reposix transport from PATH (else 'not a git command').
          cargo build --workspace --bins
          export PATH="$PWD/target/debug:$PATH"
          cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_github

  integration-contract-jira-v09:
    # ARCH-19 v0.9.0 real-backend gate: JIRA project TEST. Skips cleanly
    # when secrets are absent (pending-secrets).
    name: integration (contract, real jira v09)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run reposix-cli agent_flow_real test against JIRA TEST
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REPOSIX_JIRA_INSTANCE: ${{ secrets.REPOSIX_JIRA_INSTANCE }}
          # Owner's live JIRA project key is KAN, not the default TEST; forward
          # it so the real-backend smoke targets the project the tenant owns
          # (SURPRISES-INTAKE 2026-07-03, D91-09). Absent secret -> jira_test_project()
          # falls back to TEST.
          JIRA_TEST_PROJECT: ${{ secrets.JIRA_TEST_PROJECT }}
        run: |
          if [ -z "$JIRA_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ] \
             || [ -z "$REPOSIX_JIRA_INSTANCE" ]; then
            echo "SKIP: pending-secrets — one or more JIRA secrets unset."
            exit 0
          fi
          export REPOSIX_ALLOWED_ORIGINS="http://127.0.0.1:*,https://${REPOSIX_JIRA_INSTANCE}.atlassian.net"
          # Build + PATH the git-remote-reposix helper: agent_flow_real shells out to git,
          # which resolves the remote-reposix transport from PATH (else 'not a git command').
          cargo build --workspace --bins
          export PATH="$PWD/target/debug:$PATH"
          cargo test -p reposix-cli --test agent_flow_real -- --ignored dark_factory_real_jira

  bench-latency-v09:
    # POLISH-08 (Phase 54): real-backend latency capture for the
    # docs/benchmarks/latency.md table. Runs quality/gates/perf/latency-bench.sh
    # (QL-109, D-CONV-3 2026-07-04: comment was still naming the deleted
    # scripts/latency-bench.sh shim; the run step below always invoked the
    # canonical path) with all three credential bundles wired from secrets; each backend
    # block in the script skips cleanly when its bundle is absent, so this
    # job runs cleanly on fork PRs (sim-only) and populates real-backend
    # cells when secrets are configured on the canonical repo.
    #
    # Always uploads the regenerated Markdown as a workflow artifact so
    # reviewers can download and inspect without polluting main. The
    # weekly cron variant (.github/workflows/bench-latency-cron.yml) is
    # the only path that opens a PR with the refreshed numbers.
    name: bench-latency-v09
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3
      - name: Run latency bench against sim + available real backends
        env:
          # GitHub — auto-injected by Actions; reubenjohn/reposix issues.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Confluence — TokenWorld space (safe to mutate per docs/reference/testing-targets.md).
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
          # JIRA — project key via JIRA_TEST_PROJECT (owner's is KAN; falls
          # back to TEST when unset); instance via REPOSIX_JIRA_INSTANCE.
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REPOSIX_JIRA_INSTANCE: ${{ secrets.REPOSIX_JIRA_INSTANCE }}
          JIRA_TEST_PROJECT: ${{ secrets.JIRA_TEST_PROJECT }}
        run: |
          # Build the full allowlist up-front; the script narrows per
          # backend block so the helper-spawned cache only sees the
          # origin it actually probes.
          allowed='http://127.0.0.1:*,https://api.github.com'
          if [ -n "$REPOSIX_CONFLUENCE_TENANT" ]; then
            allowed="${allowed},https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          fi
          if [ -n "$REPOSIX_JIRA_INSTANCE" ]; then
            allowed="${allowed},https://${REPOSIX_JIRA_INSTANCE}.atlassian.net"
          fi
          export REPOSIX_ALLOWED_ORIGINS="$allowed"
          # Artifact-only job: regenerate to scratch — the tracked latency.md is
          # regen-guard-protected; the cron workflow owns the overwrite path.
          export OUT="${RUNNER_TEMP}/latency-preview.md"
          bash quality/gates/perf/latency-bench.sh
      - name: Upload regenerated latency table
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: latency-table
          path: ${{ runner.temp }}/latency-preview.md
          if-no-files-found: error
          retention-days: 90

  shell-coverage:
    # kcov aggregate line-coverage for the in-scope shell-script corpus
    # (catalog row code/shell-coverage). The gate's own non-zero exit enforces
    # the ratchet floor in quality/shell-coverage-floor.txt — a drop below it
    # fails this job. No `needs:` — it shares nothing with the Rust build, so it
    # runs immediately in parallel rather than serializing behind `test`.
    name: shell-coverage
    runs-on: ubuntu-latest
    # Explicit cap (else GitHub's 360-min default silently applies -- 2026-07-19
    # pre-pr timeout forensic audit). Observed 1m07s-1m18s across 3 recent
    # green runs (kcov is built from source every run, no cache -- still
    # stable); 3 is ~2x the high end, bounded fast-fail on a genuine hang.
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install kcov
        # apt dropped kcov on Ubuntu 24.04 (noble), and the prebuilt release
        # binary links against binutils-2.38 / libssl.so.1.1 / GLIBC 2.34 —
        # none present on noble — so build kcov from source. The
        # `kcov --version` line makes the step fail loudly if the build is unusable.
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-dev libcurl4-openssl-dev libdw-dev libiberty-dev zlib1g-dev libssl-dev cmake g++
          git clone --depth 1 --branch v43 https://github.com/SimonKagstrom/kcov /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov-build -j2
          sudo cmake --install /tmp/kcov-build
          kcov --version
      - name: Run shell-coverage gate (enforces the ratchet floor)
        run: bash quality/gates/code/shell-coverage.sh
      - name: Upload shell coverage to Codecov
        # if: always() — publish the cobertura even on a floor breach (the gate
        # writes it before grading), so Codecov still shows the shell number
        # while the failed gate step keeps the job red. Mirrors the `coverage`
        # job's upload shape (fail_ci_if_error: false + CODECOV_TOKEN).
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: quality/reports/verifications/code/shell-coverage.cobertura.xml
          flags: shell
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  runner-unit-tests:
    # OP-8 P110 intake row 10: the quality/runners/test_*.py guards shipped but
    # were never collected by CI, so durable regression guards (e.g. the
    # fleet-safety-untracked DP-2 guard from 3d3e60e) were inert -- GREEN only on a
    # local run, a metric generated-but-not-watched. This job runs the ENV-SAFE
    # subset: hermetic tests that need NO backend creds / network. Each was
    # confirmed passing locally (2026-07-12) before wiring. No `needs:` -- it
    # shares nothing with the Rust build, so it runs immediately in parallel.
    #
    # DELIBERATE EXCLUSION: quality/runners/test_realbackend.py is NOT run here --
    # it exercises the real-backend env-gating path and belongs to the credentialed
    # real-backend cadence (pre-release-real-backend), not this hermetic lane.
    name: runner unit tests (hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run env-safe runner unit tests
        run: |
          python3 -m pytest -q \
            quality/runners/test_audit_field.py \
            quality/runners/test_run.py \
            quality/runners/test_verdict.py \
            quality/runners/test_freshness.py \
            quality/runners/test_freshness_synth.py \
            quality/runners/test_fleet_safety_verdicts_untracked.py

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [test]
    # Explicit cap (else GitHub's 360-min default silently applies -- 2026-07-19
    # pre-pr timeout forensic audit). Observed 2m34s-2m53s across 3 recent green
    # runs (29677846998/29676798318/29674505740); 6 is ~2x the high end,
    # bounded fast-fail on a genuine hang without chasing rust-cache-miss
    # variance (that's the pre-pr job's problem, tracked via the GTH below).
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
