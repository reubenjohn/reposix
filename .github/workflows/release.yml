# release.yml — 5-platform release pipeline mirroring what
# `dist generate-ci` (cargo-dist 0.31.0) would emit. Hand-authored to
# avoid carrying a `cargo install dist-cli` step in CI; the
# [workspace.metadata.dist] block in root Cargo.toml is the source of
# truth for targets, installers, and the homebrew tap.
#
# Triggered on:
#   - tag push matching `v*`
#   - manual workflow_dispatch (for re-runs / dry-runs)
#
# Outputs (attached to the GitHub Release):
#   - reposix-${tag}-x86_64-unknown-linux-musl.tar.gz
#   - reposix-${tag}-aarch64-unknown-linux-musl.tar.gz
#   - reposix-${tag}-x86_64-apple-darwin.tar.gz
#   - reposix-${tag}-aarch64-apple-darwin.tar.gz
#   - reposix-${tag}-x86_64-pc-windows-msvc.zip
#   - reposix-installer.sh           (curl | sh)
#   - reposix-installer.ps1          (irm | iex)
#   - SHA256SUMS
#
# Bundled binaries:
#   - reposix              — top-level CLI (init / sim / list / refresh / spaces)
#   - git-remote-reposix   — git remote helper (stateless-connect + export)
#
# The `upload-homebrew-formula` job pushes a generated formula to
# reubenjohn/homebrew-reposix; it requires the HOMEBREW_TAP_TOKEN repo
# secret (a fine-grained PAT with contents:write scope on the tap repo).
# If the secret is absent the job is skipped without failing the release.

name: release

# NOTE (P61 SUBJ-03): this workflow runs IN PARALLEL with
# .github/workflows/quality-pre-release.yml. Both fire on the same tag
# push (v*, reposix-cli-v*). If pre-release verification fails (RED
# catalog -- STALE subjective rubric rows or FAIL gates), the release
# artifacts are still produced; the maintainer must manually invalidate
# the release. Hard-gate chaining (release waits for pre-release
# verdict) is filed as a v0.12.1 carry-forward via MIGRATE-03 in
# .planning/REQUIREMENTS.md, because GitHub Actions cross-workflow
# `needs:` declarations are unsupported (P56 SURPRISES row 1).

on:
  push:
    tags:
      - 'v*'
      - 'reposix-cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.plan.outputs.release_tag }}
      version: ${{ steps.plan.outputs.version }}
      version_tag: ${{ steps.plan.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag + version
        id: plan
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            # Manual dispatch: derive a synthetic dev tag.
            RELEASE_TAG="v0.0.0-dev-$(date -u +%Y%m%d%H%M%S)"
          fi
          # Strip release-plz per-crate prefix if present.
          # release-plz uses the pattern <crate>-v<semver>; we ship a single
          # release pipeline keyed on reposix-cli's version (reposix-cli is the
          # user-facing crate; reposix-remote ships in the same archive).
          VERSION="${RELEASE_TAG#reposix-cli-v}"
          VERSION="${VERSION#v}"
          # version_tag is the short v-prefixed form used inside archive
          # filenames so docs/installers see `reposix-v0.11.3-<target>.tar.gz`
          # regardless of whether the trigger was `v0.11.3` or
          # `reposix-cli-v0.11.3`.
          VERSION_TAG="v${VERSION}"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved: release_tag=${RELEASE_TAG} version=${VERSION} version_tag=${VERSION_TAG}"

  build-binaries:
    name: build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tgz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tgz
            cross: true
            zig: true                   # use cargo-zigbuild (ships a working musl arm64 linker)
          # TODO(POLISH2-02 follow-up): once an arm64-musl tarball lands in a
          # tagged release, re-introduce the arm64 branch in `on_linux do` of
          # the homebrew formula generator below (currently x86_64-musl-only
          # since fe50b75).
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tgz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tgz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl + cross-linker (Linux musl targets)
        if: matrix.cross == true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install zigbuild (arm64-musl)
        if: matrix.zig == true
        run: |
          set -euo pipefail
          # Pinned versions for reproducibility — bump knowingly.
          pip3 install --user "ziglang==0.13.0"
          cargo install --locked cargo-zigbuild@0.20.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.zig }}" == "true" ]]; then
            cargo zigbuild --release --locked --target ${{ matrix.target }} \
              -p reposix-cli -p reposix-remote
          else
            cargo build --release --locked --target ${{ matrix.target }} \
              -p reposix-cli -p reposix-remote
          fi

      - name: Stage archive
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.plan.outputs.version_tag }}"
          STAGE="reposix-${TAG}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/reposix.exe" "$STAGE/"
            cp "target/${{ matrix.target }}/release/git-remote-reposix.exe" "$STAGE/"
          else
            cp "target/${{ matrix.target }}/release/reposix" "$STAGE/"
            cp "target/${{ matrix.target }}/release/git-remote-reposix" "$STAGE/"
          fi
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "$STAGE/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ARCHIVE="${STAGE}.zip"
            if command -v 7z >/dev/null; then
              7z a -tzip "$ARCHIVE" "$STAGE" >/dev/null
            else
              powershell -Command "Compress-Archive -Path '$STAGE' -DestinationPath '$ARCHIVE'"
            fi
          else
            ARCHIVE="${STAGE}.tar.gz"
            tar -czf "$ARCHIVE" "$STAGE"
          fi

          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi
          ls -lh "$ARCHIVE" "${ARCHIVE}.sha256"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: reposix-${{ matrix.target }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.archive }}.sha256
          retention-days: 7

  host:
    name: host (release page)
    needs: [plan, build-binaries]
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ needs.plan.outputs.release_tag }}
      version: ${{ needs.plan.outputs.version }}
      version_tag: ${{ needs.plan.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256
          ls -lh

      - name: Generate installer scripts
        run: |
          set -euo pipefail
          # RELEASE_TAG is the actual GH Release object name (e.g.
          # `reposix-cli-v0.11.3` when triggered by release-plz, or
          # `v0.11.3` when triggered by a workspace tag push). Used in
          # `releases/download/<tag>/...` URL segments because that's the
          # path GitHub serves the assets under.
          # VERSION_TAG is the short v-prefixed form (e.g. `v0.11.3`)
          # used inside archive filenames so docs/installers see
          # `reposix-v0.11.3-<target>.tar.gz` regardless of trigger.
          RELEASE_TAG="${{ needs.plan.outputs.release_tag }}"
          VERSION_TAG="${{ needs.plan.outputs.version_tag }}"
          REPO="reubenjohn/reposix"

          # POSIX installer (curl | sh)
          cat > dist/reposix-installer.sh <<INSTALLER_EOF
          #!/usr/bin/env sh
          # reposix installer (POSIX)
          # Usage: curl --proto '=https' --tlsv1.2 -LsSf URL | sh
          set -eu

          REPO="${REPO}"
          RELEASE_TAG="${RELEASE_TAG}"
          VERSION_TAG="${VERSION_TAG}"
          INSTALL_DIR="\${REPOSIX_INSTALL_DIR:-\$HOME/.local/bin}"

          uname_s=\$(uname -s)
          uname_m=\$(uname -m)

          case "\$uname_s" in
            Linux)  os="unknown-linux-musl" ;;
            Darwin) os="apple-darwin" ;;
            *) echo "unsupported OS: \$uname_s" >&2; exit 1 ;;
          esac

          case "\$uname_m" in
            x86_64|amd64)        arch="x86_64" ;;
            arm64|aarch64)       arch="aarch64" ;;
            *) echo "unsupported arch: \$uname_m" >&2; exit 1 ;;
          esac

          target="\${arch}-\${os}"
          archive="reposix-\${VERSION_TAG}-\${target}.tar.gz"
          url="https://github.com/\${REPO}/releases/download/\${RELEASE_TAG}/\${archive}"

          echo "→ downloading \$url"
          tmp=\$(mktemp -d)
          curl --proto '=https' --tlsv1.2 -LsSf "\$url" -o "\$tmp/\$archive"
          tar -xzf "\$tmp/\$archive" -C "\$tmp"

          mkdir -p "\$INSTALL_DIR"
          cp "\$tmp/reposix-\${VERSION_TAG}-\${target}/reposix" "\$INSTALL_DIR/"
          cp "\$tmp/reposix-\${VERSION_TAG}-\${target}/git-remote-reposix" "\$INSTALL_DIR/"
          chmod +x "\$INSTALL_DIR/reposix" "\$INSTALL_DIR/git-remote-reposix"
          rm -rf "\$tmp"

          echo "✓ installed reposix and git-remote-reposix to \$INSTALL_DIR"
          echo "  Add \$INSTALL_DIR to PATH if it isn't already."
          INSTALLER_EOF
          chmod +x dist/reposix-installer.sh

          # PowerShell installer (irm | iex)
          cat > dist/reposix-installer.ps1 <<INSTALLER_EOF
          # reposix installer (PowerShell)
          # Usage: irm URL | iex
          \$ErrorActionPreference = 'Stop'
          \$Repo = '${REPO}'
          \$ReleaseTag = '${RELEASE_TAG}'
          \$VersionTag = '${VERSION_TAG}'
          \$InstallDir = if (\$env:REPOSIX_INSTALL_DIR) { \$env:REPOSIX_INSTALL_DIR } else { "\$env:USERPROFILE\\.local\\bin" }

          \$target = 'x86_64-pc-windows-msvc'
          \$archive = "reposix-\$VersionTag-\$target.zip"
          \$url = "https://github.com/\$Repo/releases/download/\$ReleaseTag/\$archive"

          Write-Host "→ downloading \$url"
          \$tmp = New-Item -ItemType Directory -Path "\$env:TEMP\\reposix-installer-\$(Get-Random)"
          \$out = Join-Path \$tmp \$archive
          Invoke-WebRequest -Uri \$url -OutFile \$out
          Expand-Archive -Path \$out -DestinationPath \$tmp

          New-Item -ItemType Directory -Force -Path \$InstallDir | Out-Null
          Copy-Item "\$tmp\\reposix-\$VersionTag-\$target\\reposix.exe" \$InstallDir
          Copy-Item "\$tmp\\reposix-\$VersionTag-\$target\\git-remote-reposix.exe" \$InstallDir
          Remove-Item -Recurse -Force \$tmp

          Write-Host "✓ installed reposix.exe and git-remote-reposix.exe to \$InstallDir"
          Write-Host "  Add \$InstallDir to PATH if it isn't already."
          INSTALLER_EOF

          ls -lh dist/

      - name: Extract CHANGELOG body for this tag
        id: changelog
        run: |
          set -euo pipefail
          # CHANGELOG sections are headed `## [vX.Y.Z] — DATE` (the workspace
          # v-prefixed form), so the lookup key is version_tag, NOT the raw
          # release_tag (which can be `reposix-cli-vX.Y.Z` under release-plz).
          TAG="${{ needs.plan.outputs.version_tag }}"
          # RELEASE_TAG is the GH Release object's tag — used in the per-tag
          # install URLs we echo into the body, since users land on
          # `releases/download/<release_tag>/...`.
          RELEASE_TAG="${{ needs.plan.outputs.release_tag }}"
          awk -v tag="## [${TAG}]" '
            $0 ~ /^## \[/ {
              if (in_section) exit
              if (index($0, tag) == 1) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > body.md
          if [ ! -s body.md ]; then
            printf "reposix %s — see CHANGELOG.md for the full notes.\n" "${TAG}" > body.md
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo ""
            echo "\`\`\`bash"
            echo "# Linux/macOS"
            echo "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/reubenjohn/reposix/releases/download/${RELEASE_TAG}/reposix-installer.sh | sh"
            echo ""
            echo "# Windows (PowerShell)"
            echo "powershell -ExecutionPolicy Bypass -c \"irm https://github.com/reubenjohn/reposix/releases/download/${RELEASE_TAG}/reposix-installer.ps1 | iex\""
            echo ""
            echo "# Homebrew"
            echo "brew install reubenjohn/reposix/reposix"
            echo ""
            echo "# cargo binstall"
            echo "cargo binstall reposix-cli reposix-remote"
            echo "\`\`\`"
          } >> body.md

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh release view/create/edit/upload all target the GH Release
          # object's tag name. release-plz already created the object as
          # `reposix-cli-vX.Y.Z`; using `version_tag` here would create a
          # SECOND object, which is the wrong behaviour.
          TAG="${{ needs.plan.outputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file body.md
          else
            gh release create "$TAG" --title "reposix ${TAG}" --notes-file body.md
          fi
          gh release upload "$TAG" \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS \
            dist/reposix-installer.sh dist/reposix-installer.ps1 --clobber

  upload-homebrew-formula:
    name: upload homebrew formula
    needs: [plan, host]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.plan.outputs.release_tag, '-dev-') }}
    steps:
      - name: Check tap token
        id: check
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping homebrew formula upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          repository: reubenjohn/homebrew-reposix
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release SHAs
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # `gh release download` targets the GH Release object's tag name.
          TAG="${{ needs.plan.outputs.release_tag }}"
          mkdir -p shas
          gh release download "$TAG" --pattern 'SHA256SUMS' --dir shas/ -R reubenjohn/reposix
          cat shas/SHA256SUMS

      - name: Generate + commit formula
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # RELEASE_TAG = the GH Release object's tag (URL host segment in
          # `releases/download/<tag>/...`). VERSION_TAG = v-prefixed form
          # used in archive filenames. VERSION = bare semver for the
          # formula `version "X.Y.Z"` field.
          RELEASE_TAG="${{ needs.plan.outputs.release_tag }}"
          VERSION="${{ needs.plan.outputs.version }}"
          VERSION_TAG="${{ needs.plan.outputs.version_tag }}"

          x86_darwin_sha=$(awk -v t="reposix-${VERSION_TAG}-x86_64-apple-darwin.tar.gz" '$2==t {print $1}' shas/SHA256SUMS)
          arm_darwin_sha=$(awk -v t="reposix-${VERSION_TAG}-aarch64-apple-darwin.tar.gz" '$2==t {print $1}' shas/SHA256SUMS)
          x86_linux_sha=$(awk -v t="reposix-${VERSION_TAG}-x86_64-unknown-linux-musl.tar.gz" '$2==t {print $1}' shas/SHA256SUMS)

          mkdir -p tap/Formula
          cat > tap/Formula/reposix.rb <<FORMULA_EOF
          class Reposix < Formula
            desc "Git-native partial-clone exposing REST APIs as POSIX files for autonomous agents"
            homepage "https://github.com/reubenjohn/reposix"
            version "${VERSION}"
            license "MIT OR Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/reubenjohn/reposix/releases/download/${RELEASE_TAG}/reposix-${VERSION_TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_darwin_sha}"
              else
                url "https://github.com/reubenjohn/reposix/releases/download/${RELEASE_TAG}/reposix-${VERSION_TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${x86_darwin_sha}"
              end
            end

            on_linux do
              url "https://github.com/reubenjohn/reposix/releases/download/${RELEASE_TAG}/reposix-${VERSION_TAG}-x86_64-unknown-linux-musl.tar.gz"
              sha256 "${x86_linux_sha}"
            end

            def install
              bin.install "reposix"
              bin.install "git-remote-reposix"
            end

            test do
              system "#{bin}/reposix", "--version"
            end
          end
          FORMULA_EOF

          cd tap
          git config user.name "reposix-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Formula/reposix.rb
          git commit -m "reposix ${RELEASE_TAG}"
          git push
