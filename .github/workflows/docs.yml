name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs-material mkdocs-minify-plugin

      - name: Lint docs (banned-words, DOCS-09)
        run: scripts/banned-words-lint.sh

      - name: Build strict (fail on broken links)
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          mkdocs gh-deploy --force --clean --no-history
