name: quality-post-release

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-post-release-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  post-release-gates:
    name: post-release gates
    # Only run if the release workflow succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Rust (for cargo-binstall rehearsal)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # DRAIN-24 (P124/SC3) — binary provenance for the container docs-repro rows.
      # The `post-release` cadence grades every `kind: container` docs-repro row
      # (example-01/02/04/05); each host-mounts `target/debug/reposix` into an
      # ubuntu:24.04 container via quality/gates/docs-repro/container-rehearse.sh
      # (see that harness's `-v $REPO_ROOT/target:/workspace/target` mount + its
      # "cargo build -p reposix-cli first" recovery hint). Without an EXPLICIT build
      # the binary's presence on a cold runner is an unconfirmed implicit cache, and
      # those rows would silently degrade to NOT-VERIFIED for a missing host binary.
      # This step makes the binary a hard, provenance-guaranteed dependency of the
      # gate run (it precedes "Run post-release cadence gates"; if it fails the job
      # fails before grading). Enforced by
      # quality/gates/structure/container-rehearse-binary-provenance.sh.
      - name: Build reposix (host binary the container docs-repro rows mount)
        run: cargo build -p reposix-cli

      - name: Run post-release cadence gates
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 quality/runners/run.py --cadence post-release

      - name: Generate verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 quality/runners/verdict.py --cadence post-release

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-post-release-${{ github.run_id }}
          path: |
            quality/reports/verifications/
            quality/reports/verdicts/post-release/
            quality/reports/badge.json
          retention-days: 180
