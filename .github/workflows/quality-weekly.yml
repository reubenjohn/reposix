name: quality-weekly

on:
  schedule:
    # Cost-conscious weekly cron per owner directive (NOT nightly).
    # Monday 09:00 UTC = catches drift before week-of-work begins.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # so the run can open a tracking issue if RED

concurrency:
  group: quality-weekly
  cancel-in-progress: false

jobs:
  weekly-gates:
    name: weekly gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run weekly cadence gates
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 quality/runners/run.py --cadence weekly

      - name: Generate verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        # D-CONV-2 (2026-07-04, quality/SURPRISES.md "Quality Convergence"):
        # --fail-on red tolerates a yellow verdict here. The only red-badge
        # cause on the weekly cadence today is the two structurally-manual
        # P2 headline-number rows (docs-reproducible.json
        # benchmark-claim/8ms-cached-read + 89.1-percent-token-reduction --
        # kind: manual, verifier.script: null); a yellow verdict renders as
        # an honest yellow badge + this workflow's own alerting, not a
        # failed job crying wolf every week.
        run: python3 quality/runners/verdict.py --cadence weekly --fail-on red

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-weekly-${{ github.run_id }}
          path: |
            quality/reports/verifications/
            quality/reports/verdicts/weekly/
            quality/reports/badge.json
          retention-days: 90
