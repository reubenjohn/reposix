name: bench-latency-cron

# POLISH-08 (Phase 54): weekly refresh of docs/benchmarks/latency.md
# numbers via a cron-driven PR. Runs scripts/latency-bench.sh against
# all three real backends (when secrets are configured) and opens a PR
# with the regenerated table — never pushes directly to `main` so a bad
# row can't slip into docs without review (mkdocs publishes from main).
#
# The same script also runs in CI on every push (bench-latency-v09 job
# in ci.yml), but that path only uploads an artifact. PR creation is
# reserved for this scheduled run to avoid commit-storms on every push.

on:
  schedule:
    # Mondays at 13:00 UTC. Catches API drift (GitHub deprecating an
    # endpoint, Atlassian rotating quotas) without spamming on every PR.
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-latency:
    name: refresh-latency
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install runtime tooling
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3
      - name: Capture pre-bench table
        id: pre
        run: |
          # Snapshot the existing table for the PR body diff.
          cp docs/benchmarks/latency.md /tmp/latency-before.md
      - name: Run latency bench against sim + available real backends
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATLASSIAN_API_KEY: ${{ secrets.ATLASSIAN_API_KEY }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          REPOSIX_CONFLUENCE_TENANT: ${{ secrets.REPOSIX_CONFLUENCE_TENANT }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REPOSIX_JIRA_INSTANCE: ${{ secrets.REPOSIX_JIRA_INSTANCE }}
        run: |
          allowed='http://127.0.0.1:*,https://api.github.com'
          if [ -n "$REPOSIX_CONFLUENCE_TENANT" ]; then
            allowed="${allowed},https://${REPOSIX_CONFLUENCE_TENANT}.atlassian.net"
          fi
          if [ -n "$REPOSIX_JIRA_INSTANCE" ]; then
            allowed="${allowed},https://${REPOSIX_JIRA_INSTANCE}.atlassian.net"
          fi
          export REPOSIX_ALLOWED_ORIGINS="$allowed"
          bash quality/gates/perf/latency-bench.sh
      - name: Compute PR body
        id: body
        run: |
          # Build a markdown body containing the diff between the old and new
          # tables. `diff -u` is used so reviewers see exactly which cells
          # moved; if there's no diff we still open a PR with a "no change"
          # body (for cron observability — PR existence == cron ran).
          {
            echo "## Weekly latency refresh"
            echo
            echo "Cron-driven refresh of \`docs/benchmarks/latency.md\` from"
            echo "\`scripts/latency-bench.sh\`."
            echo
            echo "### Diff"
            echo
            echo '```diff'
            if diff -u /tmp/latency-before.md docs/benchmarks/latency.md; then
              echo "(no change — backends within ±20% wobble band)"
            fi
            echo '```'
            echo
            echo "Generated by \`.github/workflows/bench-latency-cron.yml\`."
          } > /tmp/pr-body.md
          {
            echo 'body<<PRBODY_EOF'
            cat /tmp/pr-body.md
            echo 'PRBODY_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Open or update refresh PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(bench): refresh v0.9.0 latency"
          title: "chore(bench): refresh v0.9.0 latency"
          body: ${{ steps.body.outputs.body }}
          branch: bench/refresh-latency
          branch-suffix: timestamp
          base: main
          delete-branch: true
          labels: |
            bench
            automated
          add-paths: |
            docs/benchmarks/latency.md
