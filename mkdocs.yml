site_name: reposix
site_description: Edit issues as files. git push to sync. Zero MCP schema tokens.
site_url: https://reubenjohn.github.io/reposix/
repo_name: reubenjohn/reposix
repo_url: https://github.com/reubenjohn/reposix
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono

# Files intentionally excluded from the nav. Anything else missing from the nav
# is a bug — `mkdocs build --strict` will fail.
not_in_nav: |
  archive/*
  social/*
  screenshots/*
  security.md
  why.md
  connectors/guide.md
  reference/cli.md
  reference/http-api.md
  reference/git-remote.md
  reference/crates.md
  development/contributing.md
  development/roadmap.md

plugins:
  - search
  - minify:
      # minify_html: true was collapsing newlines inside `<div class="mermaid">`
      # blocks (fence_div_format), which broke mermaid's statement parsing.
      # Trade ~15% HTML size for diagrams that render. Re-enable with
      # explicit excludes if it ever matters for page weight.
      minify_html: false
  - redirects:
      redirect_maps:
        architecture.md: how-it-works/git-layer.md
        demo.md: tutorials/first-run.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  # Load mermaid explicitly. Material's bundle only auto-loads it on
  # `<pre class="mermaid">` (fence_code_format), not on `<div class="mermaid">`
  # (fence_div_format). Pin to v11 minor so the workaround stays stable.
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-render.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reubenjohn/reposix

nav:
  - Home: index.md
  - Concepts:
      - Mental model in 60 seconds: concepts/mental-model-in-60-seconds.md
      - reposix vs MCP and SDKs: concepts/reposix-vs-mcp-and-sdks.md
  - Tutorials:
      - First run (5 min): tutorials/first-run.md
  - How it works:
      - The filesystem layer: how-it-works/filesystem-layer.md
      - The git layer: how-it-works/git-layer.md
      - Time travel: how-it-works/time-travel.md
      - The trust model: how-it-works/trust-model.md
  - Guides:
      - Write your own connector: guides/write-your-own-connector.md
      - Integrate with your agent: guides/integrate-with-your-agent.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - Exit codes: reference/exit-codes.md
      - Glossary: reference/glossary.md
      - Simulator: reference/simulator.md
      - Testing targets: reference/testing-targets.md
      - JIRA backend: reference/jira.md
      - Confluence backend: reference/confluence.md
  - Benchmarks:
      - Latency: benchmarks/latency.md
      - Token economy: benchmarks/token-economy.md
  - Decisions:
      - ADR-001 GitHub state mapping: decisions/001-github-state-mapping.md
      - ADR-002 Confluence page mapping: decisions/002-confluence-page-mapping.md
      - ADR-003 Nested mount layout: decisions/003-nested-mount-layout.md
      - ADR-005 JIRA issue mapping: decisions/005-jira-issue-mapping.md
      - ADR-007 Time-travel via git tags: decisions/007-time-travel-via-git-tags.md
      - ADR-008 Helper backend dispatch: decisions/008-helper-backend-dispatch.md
      - ADR-009 Stability commitment (v1.0): decisions/009-stability-commitment.md
  - Research:
      - Initial report: research/initial-report.md
      - Agentic engineering reference: research/agentic-engineering-reference.md
