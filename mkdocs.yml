site_name: reposix
site_description: Edit issues as files. git push to sync. Zero MCP schema tokens.
site_url: https://reubenjohn.github.io/reposix/
repo_name: reubenjohn/reposix
repo_url: https://github.com/reubenjohn/reposix
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono

# Files intentionally excluded from the nav. Anything else missing from the nav
# is a bug — `mkdocs build --strict` will fail.
not_in_nav: |
  archive/*
  social/*
  screenshots/*
  architecture.md
  security.md
  why.md
  demo.md
  connectors/guide.md
  demos/index.md
  reference/cli.md
  reference/http-api.md
  reference/git-remote.md
  reference/crates.md
  development/contributing.md
  development/roadmap.md

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/reubenjohn/reposix

nav:
  - Home: index.md
  - Concepts:
      - Mental model in 60 seconds: concepts/mental-model-in-60-seconds.md
      - reposix vs MCP and SDKs: concepts/reposix-vs-mcp-and-sdks.md
  - Tutorials:
      - First run (5 min): tutorials/first-run.md
  - How it works:
      - The filesystem layer: how-it-works/filesystem-layer.md
      - The git layer: how-it-works/git-layer.md
      - The trust model: how-it-works/trust-model.md
  - Guides:
      - Write your own connector: guides/write-your-own-connector.md
      - Integrate with your agent: guides/integrate-with-your-agent.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - Simulator: reference/simulator.md
      - Testing targets: reference/testing-targets.md
      - JIRA backend: reference/jira.md
      - Confluence backend: reference/confluence.md
  - Benchmarks:
      - v0.9.0 latency: benchmarks/v0.9.0-latency.md
  - Decisions:
      - ADR-001 GitHub state mapping: decisions/001-github-state-mapping.md
      - ADR-002 Confluence page mapping: decisions/002-confluence-page-mapping.md
      - ADR-003 Nested mount layout: decisions/003-nested-mount-layout.md
      - ADR-004 Backend connector rename: decisions/004-backend-connector-rename.md
      - ADR-005 JIRA issue mapping: decisions/005-jira-issue-mapping.md
  - Research:
      - Initial report: research/initial-report.md
      - Agentic engineering reference: research/agentic-engineering-reference.md
